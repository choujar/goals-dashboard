<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sahil's 2026 Goals</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #232736;
    --border: #2e3345;
    --text: #e4e6f0;
    --text-dim: #8b8fa3;
    --text-muted: #5c6078;
    --accent: #6c7bf7;
    --accent-glow: rgba(108, 123, 247, 0.15);
    --green: #34d399;
    --green-dim: rgba(52, 211, 153, 0.12);
    --amber: #fbbf24;
    --amber-dim: rgba(251, 191, 36, 0.12);
    --red: #f87171;
    --red-dim: rgba(248, 113, 113, 0.12);
    --blue: #60a5fa;
    --radius: 12px;
    --radius-sm: 8px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  .container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 2rem 1.5rem;
  }

  /* ---- Header ---- */
  .header {
    margin-bottom: 2rem;
  }
  .header h1 {
    font-size: 2rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    margin-bottom: 0.25rem;
  }
  .header h1 span { color: var(--accent); }
  .header p { color: var(--text-dim); font-size: 0.95rem; }

  /* ---- Year Progress ---- */
  .year-bar {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.5rem;
    margin-bottom: 1.5rem;
    display: flex;
    align-items: center;
    gap: 2rem;
    flex-wrap: wrap;
  }
  .year-bar .track {
    flex: 1;
    min-width: 200px;
  }
  .year-bar .track-label {
    display: flex;
    justify-content: space-between;
    margin-bottom: 0.5rem;
    font-size: 0.85rem;
    color: var(--text-dim);
  }
  .year-bar .track-label strong {
    color: var(--text);
    font-size: 1.1rem;
  }
  .progress-rail {
    height: 10px;
    background: var(--surface2);
    border-radius: 5px;
    overflow: hidden;
    position: relative;
  }
  .progress-fill {
    height: 100%;
    border-radius: 5px;
    transition: width 0.8s ease;
    background: linear-gradient(90deg, var(--accent), #818cf8);
  }
  .year-stats {
    display: flex;
    gap: 1.5rem;
    flex-wrap: wrap;
  }
  .mini-stat {
    text-align: center;
    min-width: 70px;
  }
  .mini-stat .num {
    font-size: 1.6rem;
    font-weight: 700;
  }
  .mini-stat .label {
    font-size: 0.75rem;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .mini-stat.green .num { color: var(--green); }
  .mini-stat.amber .num { color: var(--amber); }
  .mini-stat.red .num { color: var(--red); }
  .mini-stat.blue .num { color: var(--blue); }

  /* ---- Goal Cards Grid ---- */
  .goals-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 1rem;
    margin-bottom: 2rem;
  }

  .goal-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.25rem;
    cursor: pointer;
    transition: all 0.2s ease;
    position: relative;
    overflow: hidden;
  }
  .goal-card:hover {
    border-color: var(--accent);
    box-shadow: 0 0 20px var(--accent-glow);
    transform: translateY(-1px);
  }
  .goal-card.done { border-left: 3px solid var(--green); }
  .goal-card.ahead { border-left: 3px solid var(--green); }
  .goal-card.on-track { border-left: 3px solid var(--amber); }
  .goal-card.behind { border-left: 3px solid var(--red); }
  .goal-card.not-started { border-left: 3px solid var(--text-muted); }

  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 0.75rem;
  }
  .card-zone {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-dim);
    background: var(--surface2);
    padding: 0.2rem 0.6rem;
    border-radius: 4px;
  }
  .card-verdict {
    font-size: 0.7rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    padding: 0.2rem 0.6rem;
    border-radius: 4px;
  }
  .card-verdict.done { background: var(--green-dim); color: var(--green); }
  .card-verdict.ahead { background: var(--green-dim); color: var(--green); }
  .card-verdict.on-track { background: var(--amber-dim); color: var(--amber); }
  .card-verdict.behind { background: var(--red-dim); color: var(--red); }
  .card-verdict.not-started { background: var(--surface2); color: var(--text-muted); }

  .card-goal {
    font-size: 1rem;
    font-weight: 600;
    margin-bottom: 1rem;
    line-height: 1.3;
  }

  .card-progress {
    margin-bottom: 0.75rem;
  }
  .card-progress .bar-label {
    display: flex;
    justify-content: space-between;
    font-size: 0.8rem;
    margin-bottom: 0.35rem;
  }
  .card-progress .bar-label .frac { color: var(--text); font-weight: 600; }
  .card-progress .bar-label .pct { color: var(--text-dim); }
  .card-bar {
    height: 6px;
    background: var(--surface2);
    border-radius: 3px;
    overflow: hidden;
  }
  .card-bar-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.6s ease;
  }
  .card-bar-fill.green { background: var(--green); }
  .card-bar-fill.amber { background: var(--amber); }
  .card-bar-fill.red { background: var(--red); }
  .card-bar-fill.muted { background: var(--text-muted); }

  .card-stats {
    display: flex;
    gap: 1rem;
    font-size: 0.78rem;
    color: var(--text-dim);
    border-top: 1px solid var(--border);
    padding-top: 0.75rem;
  }
  .card-stat strong {
    color: var(--text);
    font-weight: 600;
  }

  /* ---- Detail Panel ---- */
  .detail-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 100;
    backdrop-filter: blur(4px);
  }
  .detail-overlay.open { display: flex; justify-content: center; align-items: flex-start; padding-top: 5vh; }

  .detail-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    width: 90%;
    max-width: 800px;
    max-height: 85vh;
    overflow-y: auto;
    padding: 2rem;
    position: relative;
  }
  .detail-panel::-webkit-scrollbar { width: 6px; }
  .detail-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .detail-close {
    position: absolute;
    top: 1rem;
    right: 1rem;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-dim);
    width: 32px;
    height: 32px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 1.1rem;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }
  .detail-close:hover { background: var(--border); color: var(--text); }

  .detail-header {
    margin-bottom: 1.5rem;
  }
  .detail-header h2 { font-size: 1.4rem; margin-bottom: 0.25rem; }
  .detail-header p { color: var(--text-dim); font-size: 0.9rem; }

  .detail-stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
    gap: 0.75rem;
    margin-bottom: 1.5rem;
  }
  .detail-stat-card {
    background: var(--surface2);
    border-radius: var(--radius-sm);
    padding: 1rem;
    text-align: center;
  }
  .detail-stat-card .val {
    font-size: 1.5rem;
    font-weight: 700;
  }
  .detail-stat-card .val.green { color: var(--green); }
  .detail-stat-card .val.red { color: var(--red); }
  .detail-stat-card .val.amber { color: var(--amber); }
  .detail-stat-card .val.blue { color: var(--blue); }
  .detail-stat-card .lbl {
    font-size: 0.75rem;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-top: 0.25rem;
  }

  .detail-progress {
    margin-bottom: 1.5rem;
  }
  .detail-progress .progress-rail { height: 14px; }
  .detail-progress .labels {
    display: flex;
    justify-content: space-between;
    margin-bottom: 0.5rem;
    font-size: 0.85rem;
  }
  .detail-progress .labels strong { color: var(--text); }
  .detail-progress .labels span { color: var(--text-dim); }

  .detail-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.85rem;
  }
  .detail-table th {
    text-align: left;
    font-weight: 600;
    color: var(--text-dim);
    text-transform: uppercase;
    font-size: 0.7rem;
    letter-spacing: 0.06em;
    padding: 0.6rem 0.75rem;
    border-bottom: 1px solid var(--border);
  }
  .detail-table td {
    padding: 0.55rem 0.75rem;
    border-bottom: 1px solid var(--border);
    color: var(--text);
  }
  .detail-table tr:last-child td { border-bottom: none; }
  .detail-table tr.done-row td { color: var(--text-dim); }
  .detail-table .check { color: var(--green); font-weight: 700; }
  .detail-table .uncheck { color: var(--text-muted); }

  .pace-insight {
    background: var(--surface2);
    border-radius: var(--radius-sm);
    padding: 1rem 1.25rem;
    margin-bottom: 1.5rem;
    font-size: 0.9rem;
    line-height: 1.6;
    color: var(--text-dim);
    border-left: 3px solid var(--accent);
  }
  .pace-insight strong { color: var(--text); }

  /* ---- Loading ---- */
  .loading {
    text-align: center;
    padding: 4rem;
    color: var(--text-dim);
  }
  .loading .spinner {
    width: 32px; height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 1rem;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ---- Responsive ---- */
  @media (max-width: 720px) {
    .goals-grid { grid-template-columns: 1fr; }
    .year-bar { flex-direction: column; gap: 1rem; }
    .container { padding: 1rem; }
    .header h1 { font-size: 1.5rem; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1><span>2026</span> Goals Dashboard</h1>
    <p>Live from Google Sheets &middot; <span id="last-updated"></span></p>
  </div>

  <div class="year-bar" id="year-bar">
    <div class="track">
      <div class="track-label">
        <span>Year Progress</span>
        <strong id="year-pct">—</strong>
      </div>
      <div class="progress-rail">
        <div class="progress-fill" id="year-fill" style="width:0%"></div>
      </div>
    </div>
    <div class="year-stats" id="year-stats"></div>
  </div>

  <div id="goals-area">
    <div class="loading"><div class="spinner"></div>Loading goals from spreadsheet...</div>
  </div>
</div>

<div class="detail-overlay" id="detail-overlay">
  <div class="detail-panel" id="detail-panel">
    <button class="detail-close" id="detail-close">&times;</button>
    <div id="detail-content"></div>
  </div>
</div>

<script>
const BASE = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSzT76dnq0RWElcySPShgxC6hk_iHKawPwkj1bsH9EjrJGKzMZ66Xo_Mpb8ey7yJDYm7M6eJdBkSKyv/pub?output=csv';

const SHEETS = {
  dashboard: 147941376,
  parkrun: 712844439,
  fitness: 928751721,
  music: 392176720,
  listening: 451507711,
  movies: 1147366727,
  creative: 108823288,
  blood: 1258053663,
  health: 828416010,
  volunteering: 1860768583,
  lifeadmin: 1864003038,
  getaways: 187836966,
};

// CSV parser (handles quoted fields with commas)
function parseCSV(text) {
  const rows = [];
  let current = '';
  let inQuotes = false;
  const lines = text.split('\n');
  for (const line of lines) {
    if (inQuotes) {
      current += '\n' + line;
      if ((line.match(/"/g) || []).length % 2 === 1) {
        inQuotes = false;
        rows.push(parseCSVLine(current));
        current = '';
      }
    } else {
      if ((line.match(/"/g) || []).length % 2 === 1) {
        inQuotes = true;
        current = line;
      } else {
        rows.push(parseCSVLine(line));
      }
    }
  }
  return rows;
}

function parseCSVLine(line) {
  const result = [];
  let current = '';
  let inQuotes = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (inQuotes) {
      if (ch === '"' && line[i + 1] === '"') { current += '"'; i++; }
      else if (ch === '"') inQuotes = false;
      else current += ch;
    } else {
      if (ch === '"') inQuotes = true;
      else if (ch === ',') { result.push(current.trim()); current = ''; }
      else current += ch;
    }
  }
  result.push(current.trim());
  return result;
}

async function fetchSheet(key) {
  const url = `${BASE}&gid=${SHEETS[key]}`;
  const res = await fetch(url);
  return parseCSV(await res.text());
}

// ---- Year calculations ----
const YEAR_START = new Date(2026, 0, 1);
const YEAR_END = new Date(2026, 11, 31);
const NOW = new Date();
const DAYS_ELAPSED = Math.floor((NOW - YEAR_START) / 86400000);
const DAYS_LEFT = Math.floor((YEAR_END - NOW) / 86400000);
const WEEKS_ELAPSED = DAYS_ELAPSED / 7;
const WEEKS_LEFT = DAYS_LEFT / 7;
const YEAR_PCT = DAYS_ELAPSED / 365;

function statusClass(verdict) {
  const v = (verdict || '').toLowerCase();
  if (v === 'done') return 'done';
  if (v === 'ahead') return 'ahead';
  if (v === 'on track') return 'on-track';
  if (v === 'behind') return 'behind';
  return 'not-started';
}

function barColor(verdict) {
  const v = (verdict || '').toLowerCase();
  if (v === 'done' || v === 'ahead') return 'green';
  if (v === 'on track') return 'amber';
  if (v === 'behind') return 'red';
  return 'muted';
}

// ---- Build dashboard ----
async function init() {
  const [dashRows] = await Promise.all([fetchSheet('dashboard')]);

  // Parse goal rows (row index 9+ in CSV, which is after headers)
  // Find the header row
  let headerIdx = -1;
  for (let i = 0; i < dashRows.length; i++) {
    if (dashRows[i].includes('Zone') && dashRows[i].includes('Goal')) {
      headerIdx = i;
      break;
    }
  }

  const goals = [];
  for (let i = headerIdx + 1; i < dashRows.length; i++) {
    const r = dashRows[i];
    const zone = r[1];
    if (!zone) continue;
    const goal = r[2];
    const progress = parseFloat(r[3]) || 0;
    const target = r[4];
    const pctStr = r[5];
    const status = r[6];
    const dueDate = r[7];
    const paceNeeded = r[8];
    const currentRate = r[9];
    const verdict = r[11] || status;

    const targetNum = parseFloat(target);
    const pct = pctStr ? parseFloat(pctStr) / 100 : 0;

    goals.push({
      zone, goal, progress, target, targetNum, pct, pctStr,
      status, dueDate, paceNeeded, currentRate, verdict
    });
  }

  // Year bar
  document.getElementById('year-pct').textContent = Math.round(YEAR_PCT * 100) + '%';
  document.getElementById('year-fill').style.width = Math.round(YEAR_PCT * 100) + '%';

  const done = goals.filter(g => g.verdict === 'DONE' || g.verdict === 'Done').length;
  const ahead = goals.filter(g => g.verdict === 'Ahead').length;
  const onTrack = goals.filter(g => g.status === 'On Track' && g.verdict !== 'Ahead').length;
  const behind = goals.filter(g => g.verdict === 'Behind').length;
  const notStarted = goals.filter(g => g.status === 'Not Started' || g.verdict === '-').length;

  document.getElementById('year-stats').innerHTML = `
    <div class="mini-stat blue"><div class="num">${DAYS_ELAPSED}</div><div class="label">Days In</div></div>
    <div class="mini-stat"><div class="num">${DAYS_LEFT}</div><div class="label">Days Left</div></div>
    <div class="mini-stat green"><div class="num">${done + ahead}</div><div class="label">On Track</div></div>
    <div class="mini-stat red"><div class="num">${behind}</div><div class="label">Behind</div></div>
    <div class="mini-stat"><div class="num">${notStarted}</div><div class="label">Not Started</div></div>
  `;

  document.getElementById('last-updated').textContent = new Date().toLocaleDateString('en-AU', {
    weekday: 'short', day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit'
  });

  // Build goal cards
  const grid = document.createElement('div');
  grid.className = 'goals-grid';

  for (const g of goals) {
    const cls = statusClass(g.verdict);
    const pctDisplay = g.pctStr && g.pctStr !== '—' ? g.pctStr : '—';
    const isNumeric = !isNaN(g.targetNum) && g.targetNum > 0;
    const pctVal = Math.min(g.pct * 100, 100);

    // Calculate pace insight
    let paceText = '';
    if (isNumeric && g.progress < g.targetNum) {
      const remaining = g.targetNum - g.progress;
      const neededPerWeek = remaining / WEEKS_LEFT;
      const currentPerWeek = g.progress / (WEEKS_ELAPSED || 1);
      if (neededPerWeek < 1) {
        const neededPerMonth = remaining / (DAYS_LEFT / 30.4);
        paceText = `${neededPerMonth.toFixed(1)}/mo needed`;
      } else {
        paceText = `${neededPerWeek.toFixed(1)}/wk needed`;
      }
    }

    const card = document.createElement('div');
    card.className = `goal-card ${cls}`;
    card.innerHTML = `
      <div class="card-top">
        <span class="card-zone">${g.zone}</span>
        <span class="card-verdict ${cls}">${g.verdict === '-' ? 'Not Started' : g.verdict}</span>
      </div>
      <div class="card-goal">${g.goal}</div>
      ${isNumeric ? `
      <div class="card-progress">
        <div class="bar-label">
          <span class="frac">${g.progress} / ${g.target}</span>
          <span class="pct">${pctDisplay}</span>
        </div>
        <div class="card-bar"><div class="card-bar-fill ${barColor(g.verdict)}" style="width:${pctVal}%"></div></div>
      </div>` : `
      <div class="card-progress">
        <div class="bar-label"><span class="frac">${g.status}</span><span class="pct"></span></div>
      </div>`}
      <div class="card-stats">
        ${isNumeric && g.currentRate && g.currentRate !== '-' ? `<div class="card-stat">Current: <strong>${parseFloat(g.currentRate).toFixed(1)}/wk</strong></div>` : ''}
        ${paceText ? `<div class="card-stat">${paceText}</div>` : ''}
        <div class="card-stat">Due: <strong>${g.dueDate}</strong></div>
      </div>
    `;
    card.addEventListener('click', () => openDetail(g));
    grid.appendChild(card);
  }

  const area = document.getElementById('goals-area');
  area.innerHTML = '';
  area.appendChild(grid);

  // Pre-fetch detail sheets in background
  preloadSheets();
}

// ---- Detail sheet data cache ----
const sheetCache = {};

async function preloadSheets() {
  const keys = Object.keys(SHEETS).filter(k => k !== 'dashboard');
  for (const k of keys) {
    fetchSheet(k).then(data => { sheetCache[k] = data; });
  }
}

function getSheetKey(zone, goal) {
  const z = zone.toLowerCase();
  const g = goal.toLowerCase();
  if (z === 'parkrun') return 'parkrun';
  if (z === 'fitness' || z === 'sailing' || z === 'strong') return 'fitness';
  if (z === 'music') return 'music';
  if (z === 'movies') return 'movies';
  if (z === 'listening') return 'listening';
  if (z === 'blood') return 'blood';
  if (z === 'writing' || z === 'poetry') return 'creative';
  if (z === 'sleep' || z === 'steps') return 'health';
  if (z === 'volunteering') return 'volunteering';
  if (z === 'one-offs' || z === 'life admin') return 'lifeadmin';
  if (z === 'getaways') return 'getaways';
  return null;
}

function findSection(rows, keyword) {
  // Find a section in the sheet that contains the keyword
  for (let i = 0; i < rows.length; i++) {
    const joined = rows[i].join(' ').toLowerCase();
    if (joined.includes(keyword.toLowerCase())) {
      return i;
    }
  }
  return -1;
}

function extractTable(rows, startSearch) {
  // Find the header row (contains "Done" and at least one other header)
  let headerIdx = -1;
  for (let i = startSearch; i < rows.length; i++) {
    if (rows[i].some(c => c === 'Done') && rows[i].filter(c => c).length >= 3) {
      headerIdx = i;
      break;
    }
  }
  if (headerIdx === -1) return { headers: [], entries: [] };

  const headers = rows[headerIdx].filter((_, idx) => idx > 0); // skip col A
  const entries = [];
  for (let i = headerIdx + 1; i < rows.length; i++) {
    const r = rows[i].slice(1); // skip col A
    if (!r.some(c => c)) break; // empty row = end of section
    // Only include if there's a TRUE/FALSE in first col or has data
    if (r[0] === 'TRUE' || r[0] === 'FALSE' || r.some(c => c && c !== 'FALSE')) {
      entries.push(r);
    }
  }
  return { headers, entries };
}

async function openDetail(goal) {
  const overlay = document.getElementById('detail-overlay');
  const content = document.getElementById('detail-content');

  const sheetKey = getSheetKey(goal.zone, goal.goal);
  let rows = sheetCache[sheetKey];
  if (!rows && sheetKey) {
    rows = await fetchSheet(sheetKey);
    sheetCache[sheetKey] = rows;
  }

  const isNumeric = !isNaN(goal.targetNum) && goal.targetNum > 0;
  const pctVal = Math.min(goal.pct * 100, 100);
  const cls = statusClass(goal.verdict);
  const remaining = isNumeric ? goal.targetNum - goal.progress : 0;

  // Pace calculations
  let paceInsight = '';
  if (isNumeric && goal.progress < goal.targetNum) {
    const currentPerWeek = goal.progress / (WEEKS_ELAPSED || 1);
    const neededPerWeek = remaining / WEEKS_LEFT;
    const currentPerMonth = goal.progress / (DAYS_ELAPSED / 30.4);
    const neededPerMonth = remaining / (DAYS_LEFT / 30.4);

    if (goal.progress === 0) {
      paceInsight = `You haven't started yet. To hit <strong>${goal.target}</strong> by <strong>${goal.dueDate}</strong>, you need <strong>${neededPerWeek < 1 ? neededPerMonth.toFixed(1) + ' per month' : neededPerWeek.toFixed(1) + ' per week'}</strong>. That's ${Math.ceil(remaining)} to go in ${Math.round(DAYS_LEFT / 7)} weeks.`;
    } else {
      const ratio = currentPerWeek / neededPerWeek;
      if (ratio >= 1) {
        paceInsight = `You're doing <strong>${currentPerWeek.toFixed(1)}/week</strong> and only need <strong>${neededPerWeek.toFixed(1)}/week</strong> to finish on time. At this pace you'll be done with <strong>${Math.round((remaining / currentPerWeek) * 7)} days</strong> to spare.`;
      } else {
        const deficit = neededPerWeek - currentPerWeek;
        paceInsight = `You're averaging <strong>${currentPerWeek.toFixed(1)}/week</strong> but need <strong>${neededPerWeek.toFixed(1)}/week</strong> to hit your target. You need to increase by <strong>${deficit.toFixed(1)} more per week</strong> to get there.`;
      }
    }
  } else if (isNumeric && goal.progress >= goal.targetNum) {
    paceInsight = `You've hit your target. ${goal.progress} / ${goal.target} complete.`;
  }

  // Stats cards
  let statsHtml = '<div class="detail-stats">';
  if (isNumeric) {
    statsHtml += `
      <div class="detail-stat-card"><div class="val blue">${goal.progress}</div><div class="lbl">Done</div></div>
      <div class="detail-stat-card"><div class="val">${remaining}</div><div class="lbl">Remaining</div></div>
      <div class="detail-stat-card"><div class="val ${cls === 'behind' ? 'red' : cls === 'ahead' || cls === 'done' ? 'green' : 'amber'}">${Math.round(pctVal)}%</div><div class="lbl">Complete</div></div>
      <div class="detail-stat-card"><div class="val">${Math.round(YEAR_PCT * 100)}%</div><div class="lbl">Year Elapsed</div></div>
    `;
    if (goal.currentRate && goal.currentRate !== '-') {
      statsHtml += `<div class="detail-stat-card"><div class="val">${parseFloat(goal.currentRate).toFixed(1)}</div><div class="lbl">Per Week</div></div>`;
    }
    if (remaining > 0) {
      const nw = remaining / WEEKS_LEFT;
      statsHtml += `<div class="detail-stat-card"><div class="val amber">${nw.toFixed(1)}</div><div class="lbl">Need/Week</div></div>`;
    }
  }
  statsHtml += '</div>';

  // Progress bar
  let progressHtml = '';
  if (isNumeric) {
    progressHtml = `
      <div class="detail-progress">
        <div class="labels">
          <strong>${goal.progress} / ${goal.target}</strong>
          <span>${Math.round(pctVal)}% complete</span>
        </div>
        <div class="progress-rail">
          <div class="progress-fill" style="width:${pctVal}%;background:${pctVal >= YEAR_PCT * 100 ? 'var(--green)' : 'var(--red)'}"></div>
        </div>
      </div>
    `;
  }

  // Extract table from sheet
  let tableHtml = '';
  if (rows) {
    // Try to find the right section based on goal name
    const searchTerms = {
      'parkrun': ['30 parkruns', '5 volunteer'].includes(goal.goal.substring(0,12)) ? (goal.goal.includes('volunteer') ? 'VOLUNTEER' : 'PARKRUN TRACKER') : 'PARKRUN',
      'fitness': goal.zone.toLowerCase() === 'sailing' ? 'SAILING' : goal.zone.toLowerCase() === 'strong' ? 'STRENGTH' : goal.goal.includes('trail') ? 'TRAIL' : goal.goal.includes('Tai') ? 'TAI CHI' : 'CITY TO BAY',
      'music': goal.goal.includes('artist') ? 'NEW ARTISTS' : 'NEW ALBUMS',
      'creative': goal.goal.includes('poetry') ? 'POETRY' : 'WRITING',
    };

    let startFrom = 0;
    const key = sheetKey;
    if (searchTerms[key]) {
      const term = typeof searchTerms[key] === 'string' ? searchTerms[key] : searchTerms[key];
      const idx = findSection(rows, term);
      if (idx >= 0) startFrom = idx;
    }

    const { headers, entries } = extractTable(rows, startFrom);
    if (entries.length > 0) {
      const hasData = entries.some(e => e.some((c, i) => i > 0 && c && c !== 'FALSE'));
      if (hasData) {
        tableHtml = '<table class="detail-table"><thead><tr>';
        for (const h of headers) {
          if (h) tableHtml += `<th>${h}</th>`;
        }
        tableHtml += '</tr></thead><tbody>';
        for (const e of entries) {
          const isDone = e[0] === 'TRUE';
          tableHtml += `<tr class="${isDone ? 'done-row' : ''}">`;
          for (let i = 0; i < headers.length; i++) {
            if (!headers[i]) continue;
            if (i === 0) {
              tableHtml += `<td>${isDone ? '<span class="check">&#10003;</span>' : '<span class="uncheck">&#9675;</span>'}</td>`;
            } else {
              tableHtml += `<td>${e[i] || ''}</td>`;
            }
          }
          tableHtml += '</tr>';
        }
        tableHtml += '</tbody></table>';
      }
    }
  }

  content.innerHTML = `
    <div class="detail-header">
      <h2>${goal.goal}</h2>
      <p>${goal.zone} &middot; Due ${goal.dueDate}</p>
    </div>
    ${statsHtml}
    ${progressHtml}
    ${paceInsight ? `<div class="pace-insight">${paceInsight}</div>` : ''}
    ${tableHtml}
  `;

  overlay.classList.add('open');
}

// Close detail
document.getElementById('detail-close').addEventListener('click', () => {
  document.getElementById('detail-overlay').classList.remove('open');
});
document.getElementById('detail-overlay').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) {
    e.currentTarget.classList.remove('open');
  }
});
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') document.getElementById('detail-overlay').classList.remove('open');
});

init();
</script>
</body>
</html>

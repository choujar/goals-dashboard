<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Northstar · 2026 Goals</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 28 28'%3E%3Cpath d='M14 1 L15.6 12.4 L27 14 L15.6 15.6 L14 27 L12.4 15.6 L1 14 L12.4 12.4 Z' fill='%232563eb'/%3E%3Ccircle cx='14' cy='14' r='1.6' fill='%23fbf8f0'/%3E%3C/svg%3E">
<style>
  :root {
    --font-display: 'Fraunces', Georgia, serif;
    --font-body: 'Inter Tight', -apple-system, system-ui, sans-serif;
    --font-mono: 'JetBrains Mono', ui-monospace, monospace;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { background: var(--bg); color: var(--ink); font-family: var(--font-body); min-height: 100vh; -webkit-font-smoothing: antialiased; transition: background 240ms, color 240ms; }
  body { font-feature-settings: 'ss01','ss02','cv11'; }
  button { font-family: inherit; }
  ::selection { background: var(--accent-wash); color: var(--ink); }

  body::before {
    content: '';
    position: fixed; inset: 0; pointer-events: none;
    background-image: radial-gradient(rgba(0,0,0,0.018) 1px, transparent 1px);
    background-size: 3px 3px;
    z-index: 0;
  }
  [data-theme="dark"] body::before { opacity: 0.4; background-image: radial-gradient(rgba(255,255,255,0.03) 1px, transparent 1px); }

  #app { position: relative; z-index: 1; }

  .spinner {
    width: 18px; height: 18px;
    border: 2px solid var(--rule);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 720ms linear infinite;
    display: inline-block;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div id="app"></div>

<script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>

<script type="text/babel" src="theme.jsx"></script>
<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="drawer.jsx"></script>
<script type="text/babel" src="hero.jsx"></script>
<script type="text/babel" src="layouts.jsx"></script>

<script type="text/babel">
const TWEAKS_DEFAULTS = {
  theme: 'light',
  accent: 'cobalt',
  typePair: 'editorial',
  density: 'roomy',
  layout: 'focus',
};

function App() {
  const saved = (() => {
    try { return JSON.parse(localStorage.getItem('goals_tweaks') || 'null'); } catch { return null; }
  })();
  const init = { ...TWEAKS_DEFAULTS, ...(saved || {}) };

  const [theme, setTheme]       = React.useState(init.theme);
  const [accent, setAccent]     = React.useState(init.accent);
  const [typePair]              = React.useState(init.typePair);
  const [density]               = React.useState(init.density);
  const [layout, setLayout]     = React.useState(init.layout);

  const [filter, setFilter]     = React.useState('all');
  const [sortKey, setSortKey]   = React.useState('pace');
  const [openGoal, setOpenGoal] = React.useState(null);
  const [pinnedKey, setPinnedKey] = React.useState(() => {
    try { return localStorage.getItem('goals_pinned') || null; } catch { return null; }
  });

  const [goals, setGoals] = React.useState(null); // null = loading
  const [summary, setSummary] = React.useState(null);
  const [ts, setTs] = React.useState(null);
  const [loadErr, setLoadErr] = React.useState(null);
  const [refreshing, setRefreshing] = React.useState(false);

  const load = React.useCallback(async (force) => {
    setRefreshing(true); setLoadErr(null);
    try {
      const { goals, summary, ts } = await window.loadGoalData(force);
      setGoals(goals); setSummary(summary); setTs(ts);
    } catch (e) {
      console.error(e);
      setLoadErr(e.message || 'Failed to load.');
    } finally { setRefreshing(false); }
  }, []);

  React.useEffect(() => { load(false); }, [load]);

  React.useEffect(() => { window.applyTheme({ mode: theme, accentKey: accent, typePair }); }, [theme, accent, typePair]);

  React.useEffect(() => {
    const state = { theme, accent, typePair, density, layout };
    try { localStorage.setItem('goals_tweaks', JSON.stringify(state)); } catch {}
  }, [theme, accent, typePair, density, layout]);

  const togglePin = (key) => {
    setPinnedKey(prev => {
      const next = prev === key ? null : key;
      try { if (next) localStorage.setItem('goals_pinned', next); else localStorage.removeItem('goals_pinned'); } catch {}
      return next;
    });
  };

  const pinnedGoal = React.useMemo(
    () => pinnedKey && goals ? goals.find(g => g.key === pinnedKey) : null,
    [pinnedKey, goals]
  );

  const filtered = React.useMemo(() => {
    if (!goals) return [];
    if (filter === 'all')       return goals;
    if (filter === 'behind')    return goals.filter(x => x.verdict === 'behind');
    if (filter === 'on-track')  return goals.filter(x => x.verdict === 'on-track');
    if (filter === 'ahead')     return goals.filter(x => x.verdict === 'ahead' || x.verdict === 'done');
    return goals;
  }, [filter, goals]);

  const maxW = density === 'compact' ? 1080 : 1200;
  const pagePad = density === 'compact' ? '28px 24px 96px' : '44px 32px 120px';

  const cacheAge = ts ? Math.floor((Date.now() - ts) / 60000) : null;
  const cacheLabel = cacheAge == null ? 'live' : cacheAge < 1 ? 'just now' : cacheAge < 60 ? `${cacheAge}m ago` : `${Math.floor(cacheAge/60)}h ${cacheAge%60}m ago`;

  return (
    <div style={{ minHeight: '100vh' }}>
      <div style={{ maxWidth: maxW, margin: '0 auto', padding: pagePad }}>

        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 28, gap: 16, flexWrap: 'wrap' }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
            <div style={{ width: 28, height: 28, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
              <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
                <path d="M14 1 L15.6 12.4 L27 14 L15.6 15.6 L14 27 L12.4 15.6 L1 14 L12.4 12.4 Z" fill="var(--accent)"/>
                <circle cx="14" cy="14" r="1.6" fill="var(--paper)"/>
              </svg>
            </div>
            <div style={{ fontFamily: 'var(--font-display)', fontSize: 18, fontWeight: 600, color: 'var(--ink)', letterSpacing: '-0.02em' }}>
              Northstar
            </div>
            <div style={{ fontFamily: 'var(--font-mono)', fontSize: 11, color: 'var(--ink-3)', letterSpacing: '0.08em', textTransform: 'uppercase', marginLeft: 6 }}>
              / {window.TODAY.getFullYear()}
            </div>
          </div>
          <div style={{ display: 'flex', gap: 6, alignItems: 'center' }}>
            <div style={{ fontFamily: 'var(--font-mono)', fontSize: 10, color: 'var(--ink-3)', letterSpacing: '0.04em', marginRight: 8 }}>
              {refreshing ? <span><span className="spinner" style={{ marginRight: 6, verticalAlign: 'middle' }}></span> syncing</span> : `synced ${cacheLabel}`}
            </div>
            <IconBtn onClick={() => { window.clearGoalCache(); load(true); }} title="Refresh from Google Sheets">
              ↻
            </IconBtn>
            <div style={{ display: 'flex', gap: 4, alignItems: 'center', padding: '4px 6px', border: '1px solid var(--rule)', borderRadius: 999 }}>
              {['ember','forest','cobalt'].map(k => (
                <button key={k} onClick={() => setAccent(k)} title={window.ACCENTS[k].name}
                  style={{
                    width: 18, height: 18, borderRadius: 999,
                    background: window.ACCENTS[k].accent,
                    border: accent === k ? '2px solid var(--ink)' : '2px solid transparent',
                    padding: 0, cursor: 'pointer',
                    transition: 'border-color 160ms',
                  }}/>
              ))}
            </div>
            <IconBtn onClick={() => setTheme(theme === 'light' ? 'dark' : 'light')} title="Toggle theme">
              {theme === 'light' ? '☾ Dark' : '☀ Light'}
            </IconBtn>
          </div>
        </div>

        {goals === null && !loadErr && (
          <div style={{
            padding: '80px 40px', textAlign: 'center',
            border: '1px solid var(--rule)', borderRadius: 14, background: 'var(--paper)',
            boxShadow: 'var(--shadow)',
          }}>
            <div className="spinner" style={{ marginBottom: 16 }}></div>
            <div style={{ fontFamily: 'var(--font-display)', fontSize: 20, color: 'var(--ink)', marginBottom: 6 }}>Loading</div>
            <div style={{ fontSize: 13, color: 'var(--ink-3)' }}>Fetching goals from Google Sheets…</div>
          </div>
        )}

        {loadErr && (
          <div style={{
            padding: '40px', textAlign: 'center',
            border: '1px solid var(--rule)', borderRadius: 14,
            background: 'var(--paper)', boxShadow: 'var(--shadow)',
          }}>
            <div style={{ fontFamily: 'var(--font-display)', fontSize: 20, color: 'var(--status-behind)', marginBottom: 8 }}>Couldn't load</div>
            <div style={{ fontSize: 13, color: 'var(--ink-2)', marginBottom: 16 }}>{loadErr}</div>
            <IconBtn onClick={() => load(true)} title="Try again">Try again</IconBtn>
          </div>
        )}

        {goals && summary && (
          <>
            <Hero summary={summary} goals={goals} density={density} pinnedGoal={pinnedGoal} onUnpin={() => togglePin(pinnedKey)}/>

            <div style={{
              display: 'flex', gap: 8, alignItems: 'center', flexWrap: 'wrap',
              padding: '14px 0 20px',
              marginBottom: 4,
            }}>
              <div style={{ display: 'flex', gap: 6, alignItems: 'center' }}>
                <FilterChip active={filter==='all'}      onClick={() => setFilter('all')}      label="All"      count={goals.length}/>
                <FilterChip active={filter==='behind'}   onClick={() => setFilter('behind')}   label="Behind"   count={summary.behind}   verdict="behind"/>
                <FilterChip active={filter==='on-track'} onClick={() => setFilter('on-track')} label="On track" count={summary.onTrack} verdict="on-track"/>
                <FilterChip active={filter==='ahead'}    onClick={() => setFilter('ahead')}    label="Ahead"    count={summary.ahead + summary.done} verdict="ahead"/>
              </div>

              <div style={{ flex: 1 }}/>

              <div style={{ display: 'flex', gap: 6, alignItems: 'center' }}>
                <span style={{ fontSize: 10, letterSpacing: '0.14em', textTransform: 'uppercase', color: 'var(--ink-3)', fontWeight: 600, marginRight: 6 }}>View</span>
                <Seg active={layout==='focus'} onClick={() => setLayout('focus')}>Focus</Seg>
                <Seg active={layout==='zones'} onClick={() => setLayout('zones')}>Zones</Seg>
                <Seg active={layout==='table'} onClick={() => setLayout('table')}>Table</Seg>
              </div>
            </div>

            {layout === 'focus' && <LayoutFocus goals={filtered} onOpen={setOpenGoal} density={density} pinnedKey={pinnedKey} onTogglePin={togglePin}/>}
            {layout === 'zones' && <LayoutZones goals={filtered} onOpen={setOpenGoal} density={density} pinnedKey={pinnedKey} onTogglePin={togglePin}/>}
            {layout === 'table' && <LayoutTable goals={filtered} onOpen={setOpenGoal} density={density} sortKey={sortKey} onSortKey={setSortKey} pinnedKey={pinnedKey} onTogglePin={togglePin}/>}

            <div style={{ marginTop: 48, paddingTop: 20, borderTop: '1px solid var(--rule)', display: 'flex', justifyContent: 'space-between', alignItems: 'center', flexWrap: 'wrap', gap: 12 }}>
              <div style={{ fontFamily: 'var(--font-mono)', fontSize: 11, color: 'var(--ink-3)', letterSpacing: '0.04em' }}>
                {goals.length} goals · {summary.daysLeft} days to go · synced {cacheLabel}
              </div>
              <div style={{ fontSize: 12, color: 'var(--ink-2)', fontStyle: 'italic', fontFamily: 'var(--font-display)' }}>
                "Small steps, daily, beat big steps, rarely."
              </div>
            </div>
          </>
        )}
      </div>

      <DetailDrawer goal={openGoal} onClose={() => setOpenGoal(null)} density={density}/>
    </div>
  );
}

function FilterChip({ label, count, active, onClick, verdict }) {
  return (
    <button onClick={onClick} style={{
      display: 'inline-flex', alignItems: 'center', gap: 8,
      padding: '7px 12px',
      background: active ? 'var(--ink)' : 'transparent',
      color: active ? 'var(--paper)' : 'var(--ink-2)',
      border: `1px solid ${active ? 'var(--ink)' : 'var(--rule)'}`,
      borderRadius: 999,
      fontSize: 12, fontWeight: 500,
      cursor: 'pointer',
      transition: 'all 160ms',
    }}>
      {verdict && <StatusDot verdict={verdict} size={6}/>}
      {label}
      <span style={{
        fontFamily: 'var(--font-mono)', fontSize: 10,
        color: active ? 'var(--ink-4)' : 'var(--ink-3)',
        background: active ? 'rgba(255,255,255,0.08)' : 'var(--rule-soft)',
        padding: '1px 6px', borderRadius: 10,
        fontVariantNumeric: 'tabular-nums',
      }}>{count}</span>
    </button>
  );
}

function Seg({ children, active, onClick }) {
  return (
    <button onClick={onClick} style={{
      padding: '7px 14px',
      background: active ? 'var(--accent)' : 'transparent',
      color: active ? 'var(--paper)' : 'var(--ink-2)',
      border: `1px solid ${active ? 'var(--accent)' : 'var(--rule)'}`,
      borderRadius: 8,
      fontSize: 12, fontWeight: 500,
      cursor: 'pointer',
      transition: 'all 160ms',
    }}>{children}</button>
  );
}

// Apply an initial theme synchronously so first paint is correct
(function initialTheme() {
  try {
    const saved = JSON.parse(localStorage.getItem('goals_tweaks') || 'null') || {};
    const mode = saved.theme || 'light';
    const accentKey = saved.accent || 'cobalt';
    const typePair = saved.typePair || 'editorial';
    if (window.applyTheme) window.applyTheme({ mode, accentKey, typePair });
  } catch {}
})();

const root = ReactDOM.createRoot(document.getElementById('app'));
root.render(<App/>);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sahil's 2026 Goals</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a12;
    --surface: #121220;
    --surface2: #1a1a2e;
    --surface3: #25253d;
    --border: #2d2d4a;
    --text: #f0f0f8;
    --text-secondary: #b0b0cc;
    --text-muted: #6a6a8e;
    --accent: #8b5cf6;
    --accent-light: #a78bfa;
    --accent-glow: rgba(139, 92, 246, 0.15);
    --emerald: #34d399;
    --emerald-soft: rgba(52, 211, 153, 0.15);
    --amber: #fbbf24;
    --amber-soft: rgba(251, 191, 36, 0.15);
    --rose: #fb7185;
    --rose-soft: rgba(251, 113, 133, 0.15);
    --sky: #38bdf8;
    --sky-soft: rgba(56, 189, 248, 0.12);
    --cyan: #22d3ee;
    --pink: #f472b6;
    --orange: #fb923c;
    --lime: #a3e635;
    --slate: #64748b;
    --radius: 16px;
    --radius-sm: 10px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  .container { max-width: 1280px; margin: 0 auto; padding: 2.5rem 2rem; }

  /* ---- Hero / Dashboard Header ---- */
  .hero {
    background: linear-gradient(135deg, #1a1040 0%, #0f1a2e 50%, #0a1628 100%);
    border: 1px solid rgba(139,92,246,0.2);
    border-radius: 20px;
    padding: 2.5rem;
    margin-bottom: 2rem;
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute;
    top: -40%;
    right: -15%;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(139,92,246,0.12) 0%, rgba(56,189,248,0.04) 40%, transparent 70%);
    pointer-events: none;
  }
  .hero::after {
    content: '';
    position: absolute;
    bottom: -30%;
    left: -10%;
    width: 400px;
    height: 400px;
    background: radial-gradient(circle, rgba(52,211,153,0.06) 0%, transparent 60%);
    pointer-events: none;
  }

  .hero-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 2rem;
  }
  .hero-top h1 {
    font-size: 1.75rem;
    font-weight: 700;
    letter-spacing: -0.03em;
  }
  .hero-top h1 span { color: var(--accent-light); }
  .hero-top .updated {
    font-size: 0.8rem;
    color: var(--text-muted);
    margin-top: 0.3rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .refresh-btn {
    background: var(--surface3);
    border: 1px solid var(--border);
    color: var(--text-secondary);
    padding: 0.25rem 0.65rem;
    border-radius: 6px;
    font-size: 0.75rem;
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
    display: inline-flex;
    align-items: center;
    gap: 0.3rem;
  }
  .refresh-btn:hover { background: var(--border); color: var(--text); }
  .refresh-btn.spinning .refresh-icon { animation: spin 0.7s linear infinite; }
  .refresh-icon { display: inline-block; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .cache-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    display: inline-block;
  }
  .cache-dot.fresh { background: var(--emerald); }
  .cache-dot.stale { background: var(--amber); }

  .hero-arcs {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 3rem;
    flex-wrap: wrap;
  }

  /* Circular Arc */
  .arc-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
  }
  .arc-container.large { min-width: 180px; }
  .arc-container.small { min-width: 100px; }

  .arc-svg { transform: rotate(-90deg); }
  .arc-track {
    fill: none;
    stroke: var(--surface3);
  }
  .arc-fill {
    fill: none;
    stroke-linecap: round;
    transition: stroke-dashoffset 1s ease;
  }

  .arc-center {
    position: absolute;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }
  .arc-container.large .arc-center { top: 14px; left: 0; right: 0; bottom: 0; }
  .arc-container.small .arc-center { top: 8px; left: 0; right: 0; bottom: 0; }

  .arc-value {
    font-weight: 700;
    line-height: 1;
  }
  .arc-container.large .arc-value { font-size: 2.2rem; }
  .arc-container.small .arc-value { font-size: 1.4rem; }

  .arc-label {
    font-size: 0.7rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-top: 0.25rem;
    text-align: center;
  }
  .arc-sublabel {
    font-size: 0.75rem;
    color: var(--text-secondary);
    margin-top: 0.75rem;
    text-align: center;
    font-weight: 500;
  }

  .hero-divider {
    width: 1px;
    height: 100px;
    background: var(--border);
    flex-shrink: 0;
  }

  .hero-mini-arcs {
    display: flex;
    gap: 2rem;
    flex-wrap: wrap;
    justify-content: center;
  }

  /* ---- Goal Cards Grid ---- */
  .goals-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
    gap: 1rem;
  }

  .goal-card {
    background: linear-gradient(145deg, var(--surface) 0%, var(--surface2) 100%);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.5rem;
    cursor: pointer;
    transition: all 0.25s ease;
    display: flex;
    gap: 1.25rem;
    align-items: flex-start;
    position: relative;
    overflow: hidden;
  }
  .goal-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    opacity: 0;
    transition: opacity 0.25s;
  }
  .goal-card:hover::before { opacity: 1; }
  .goal-card:hover {
    border-color: rgba(139, 92, 246, 0.3);
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(0,0,0,0.3), 0 0 20px var(--accent-glow);
  }
  .goal-card.s-ahead::before, .goal-card.s-done::before { background: linear-gradient(90deg, var(--emerald), var(--cyan)); }
  .goal-card.s-on-track::before { background: linear-gradient(90deg, var(--amber), var(--orange)); }
  .goal-card.s-behind::before { background: linear-gradient(90deg, var(--rose), var(--pink)); }
  .goal-card.s-not-started::before { background: linear-gradient(90deg, var(--slate), var(--text-muted)); }

  .card-arc { flex-shrink: 0; position: relative; }
  .card-arc .arc-center {
    top: 4px; left: 0; right: 0; bottom: 0;
  }
  .card-arc .arc-value { font-size: 0.95rem; font-weight: 700; }

  .card-body { flex: 1; min-width: 0; }

  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 0.5rem;
  }
  .card-zone {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-muted);
    font-weight: 600;
  }
  .badge {
    font-size: 0.65rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    padding: 0.15rem 0.5rem;
    border-radius: 6px;
  }
  .badge.ahead, .badge.done { background: linear-gradient(135deg, rgba(52,211,153,0.18), rgba(34,211,238,0.12)); color: var(--emerald); border: 1px solid rgba(52,211,153,0.2); }
  .badge.on-track { background: linear-gradient(135deg, rgba(251,191,36,0.18), rgba(251,146,60,0.12)); color: var(--amber); border: 1px solid rgba(251,191,36,0.2); }
  .badge.behind { background: linear-gradient(135deg, rgba(251,113,133,0.18), rgba(244,114,182,0.12)); color: var(--rose); border: 1px solid rgba(251,113,133,0.2); }
  .badge.not-started { background: var(--surface3); color: var(--text-muted); border: 1px solid var(--border); }

  .card-goal {
    font-size: 0.95rem;
    font-weight: 600;
    line-height: 1.3;
    margin-bottom: 0.75rem;
    color: var(--text);
  }

  .card-meta {
    display: flex;
    gap: 1.25rem;
    font-size: 0.75rem;
    color: var(--text-muted);
  }
  .card-meta strong { color: var(--text-secondary); font-weight: 600; }

  /* ---- Detail Overlay ---- */
  .detail-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.65);
    z-index: 100;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
  }
  .detail-overlay.open {
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding-top: 4vh;
    animation: fadeIn 0.15s ease;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .detail-panel {
    background: linear-gradient(160deg, var(--surface2) 0%, var(--surface) 100%);
    border: 1px solid var(--border);
    border-radius: 20px;
    width: 92%;
    max-width: 800px;
    max-height: 88vh;
    overflow-y: auto;
    padding: 2.5rem;
    position: relative;
    animation: slideUp 0.2s ease;
  }
  @keyframes slideUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  .detail-panel::-webkit-scrollbar { width: 5px; }
  .detail-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .detail-close {
    position: absolute;
    top: 1.25rem;
    right: 1.25rem;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-secondary);
    width: 36px;
    height: 36px;
    border-radius: 10px;
    cursor: pointer;
    font-size: 1.2rem;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }
  .detail-close:hover { background: var(--surface3); color: var(--text); }

  .detail-hero {
    display: flex;
    gap: 2rem;
    align-items: center;
    margin-bottom: 2rem;
    flex-wrap: wrap;
  }
  .detail-hero-info { flex: 1; }
  .detail-hero-info h2 { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 0.25rem; }
  .detail-hero-info p { color: var(--text-muted); font-size: 0.9rem; }

  .detail-stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
    gap: 0.75rem;
    margin-bottom: 1.75rem;
  }
  .d-stat {
    background: var(--surface2);
    border-radius: var(--radius-sm);
    padding: 1rem;
    text-align: center;
    border: 1px solid var(--border);
  }
  .d-stat .val { font-size: 1.5rem; font-weight: 700; line-height: 1.2; }
  .d-stat .val.emerald { color: var(--emerald); }
  .d-stat .val.rose { color: var(--rose); }
  .d-stat .val.amber { color: var(--amber); }
  .d-stat .val.sky { color: var(--sky); }
  .d-stat .lbl {
    font-size: 0.65rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-top: 0.3rem;
    font-weight: 500;
  }

  .detail-progress { margin-bottom: 1.75rem; }
  .detail-progress .labels {
    display: flex;
    justify-content: space-between;
    font-size: 0.85rem;
    margin-bottom: 0.5rem;
  }
  .detail-progress .labels strong { color: var(--text); }
  .detail-progress .labels span { color: var(--text-muted); }
  .progress-rail {
    height: 10px;
    background: var(--surface3);
    border-radius: 5px;
    overflow: hidden;
    position: relative;
  }
  .progress-rail .marker {
    position: absolute;
    top: -3px;
    bottom: -3px;
    width: 2px;
    background: var(--text-secondary);
    border-radius: 1px;
    opacity: 0.6;
  }
  .progress-fill {
    height: 100%;
    border-radius: 5px;
    transition: width 0.8s ease;
  }

  .pace-insight {
    background: linear-gradient(135deg, rgba(139,92,246,0.08), rgba(56,189,248,0.05));
    border-radius: var(--radius-sm);
    padding: 1.25rem;
    margin-bottom: 1.75rem;
    font-size: 0.9rem;
    line-height: 1.7;
    color: var(--text-secondary);
    border-left: 3px solid var(--accent);
    border: 1px solid rgba(139,92,246,0.15);
    border-left: 3px solid var(--accent);
  }
  .pace-insight strong { color: var(--text); }

  .detail-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.85rem;
  }
  .detail-table th {
    text-align: left;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    font-size: 0.65rem;
    letter-spacing: 0.08em;
    padding: 0.65rem 0.75rem;
    border-bottom: 1px solid var(--border);
  }
  .detail-table td {
    padding: 0.6rem 0.75rem;
    border-bottom: 1px solid rgba(42,46,58,0.5);
    color: var(--text);
  }
  .detail-table tr:last-child td { border-bottom: none; }
  .detail-table tr.done-row td { color: var(--text-muted); }
  .detail-table .check { color: var(--emerald); }
  .detail-table .uncheck { color: var(--text-muted); }

  /* ---- Loading ---- */
  .loading { text-align: center; padding: 6rem; color: var(--text-muted); }
  .spinner {
    width: 28px; height: 28px;
    border: 2.5px solid var(--surface3);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: 0 auto 1rem;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 768px) {
    .container { padding: 1.25rem; }
    .hero { padding: 1.5rem; }
    .hero-arcs { gap: 1.5rem; }
    .hero-divider { display: none; }
    .goals-grid { grid-template-columns: 1fr; }
    .hero-top h1 { font-size: 1.3rem; }
    .detail-panel { padding: 1.5rem; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="hero" id="hero">
    <div class="hero-top">
      <div>
        <h1><span>2026</span> Goals</h1>
        <div class="updated" id="last-updated">
          <span id="cache-status"></span>
          <button class="refresh-btn" id="refresh-btn" title="Refresh from Google Sheets">
            <span class="refresh-icon">&#8635;</span> Refresh
          </button>
        </div>
      </div>
    </div>
    <div class="hero-arcs" id="hero-arcs">
      <div class="loading"><div class="spinner"></div></div>
    </div>
  </div>

  <div id="goals-area">
    <div class="loading"><div class="spinner"></div>Loading goals...</div>
  </div>
</div>

<div class="detail-overlay" id="detail-overlay">
  <div class="detail-panel" id="detail-panel">
    <button class="detail-close" id="detail-close">&times;</button>
    <div id="detail-content"></div>
  </div>
</div>

<script>
const BASE = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSzT76dnq0RWElcySPShgxC6hk_iHKawPwkj1bsH9EjrJGKzMZ66Xo_Mpb8ey7yJDYm7M6eJdBkSKyv/pub?output=csv';

const SHEETS = {
  dashboard: 147941376, parkrun: 712844439, fitness: 928751721,
  music: 392176720, listening: 451507711, movies: 1147366727,
  creative: 108823288, blood: 1258053663, health: 828416010,
  volunteering: 1860768583, lifeadmin: 1864003038, getaways: 187836966,
};

function parseCSV(text) {
  const rows = []; let current = ''; let inQ = false;
  for (const line of text.split('\n')) {
    if (inQ) { current += '\n' + line; if ((line.match(/"/g)||[]).length % 2 === 1) { inQ = false; rows.push(parseLine(current)); current = ''; } }
    else { if ((line.match(/"/g)||[]).length % 2 === 1) { inQ = true; current = line; } else rows.push(parseLine(line)); }
  }
  return rows;
}
function parseLine(line) {
  const r = []; let c = ''; let q = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (q) { if (ch === '"' && line[i+1] === '"') { c += '"'; i++; } else if (ch === '"') q = false; else c += ch; }
    else { if (ch === '"') q = true; else if (ch === ',') { r.push(c.trim()); c = ''; } else c += ch; }
  }
  r.push(c.trim()); return r;
}
const CACHE_TTL = 60 * 60 * 1000; // 1 hour

function getCached(key) {
  try {
    const raw = localStorage.getItem('goals_' + key);
    if (!raw) return null;
    const { data, ts } = JSON.parse(raw);
    if (Date.now() - ts > CACHE_TTL) return null;
    return data;
  } catch { return null; }
}

function setCache(key, data) {
  try { localStorage.setItem('goals_' + key, JSON.stringify({ data, ts: Date.now() })); } catch {}
}

function getCacheAge() {
  try {
    const raw = localStorage.getItem('goals_dashboard');
    if (!raw) return null;
    return Date.now() - JSON.parse(raw).ts;
  } catch { return null; }
}

async function fetchSheetFresh(key) {
  const r = await fetch(`${BASE}&gid=${SHEETS[key]}`);
  const data = parseCSV(await r.text());
  setCache(key, data);
  return data;
}

async function fetchSheet(key, forceRefresh) {
  if (!forceRefresh) {
    const cached = getCached(key);
    if (cached) return cached;
  }
  return fetchSheetFresh(key);
}

function clearAllCache() {
  Object.keys(SHEETS).forEach(k => localStorage.removeItem('goals_' + k));
}

const Y0 = new Date(2026,0,1), Y1 = new Date(2026,11,31), NOW = new Date();
const DAYS_IN = Math.floor((NOW-Y0)/864e5), DAYS_LEFT = Math.floor((Y1-NOW)/864e5);
const WK_IN = DAYS_IN/7, WK_LEFT = DAYS_LEFT/7, YR_PCT = DAYS_IN/365;

// SVG Arc helper with gradient support
let gradId = 0;
function arcSVG(size, stroke, pct, color, color2) {
  const r = (size - stroke) / 2;
  const circ = 2 * Math.PI * r;
  const offset = circ * (1 - Math.min(pct, 1));
  const id = 'g' + (gradId++);
  const c2 = color2 || color;
  return `<svg class="arc-svg" width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
    <defs><linearGradient id="${id}" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="${color}"/>
      <stop offset="100%" stop-color="${c2}"/>
    </linearGradient></defs>
    <circle class="arc-track" cx="${size/2}" cy="${size/2}" r="${r}" stroke-width="${stroke}" stroke="rgba(255,255,255,0.06)"/>
    <circle class="arc-fill" cx="${size/2}" cy="${size/2}" r="${r}" stroke-width="${stroke}" stroke="url(#${id})"
      stroke-dasharray="${circ}" stroke-dashoffset="${offset}"/>
  </svg>`;
}

function statusCls(v) {
  v = (v||'').toLowerCase();
  return v === 'done' ? 'done' : v === 'ahead' ? 'ahead' : (v === 'close' || v === 'on track') ? 'on-track' : v === 'behind' ? 'behind' : 'not-started';
}
function arcColors(v) {
  v = (v||'').toLowerCase();
  if (v==='done'||v==='ahead') return ['#34d399','#22d3ee'];
  if (v==='close'||v==='on track') return ['#fbbf24','#fb923c'];
  if (v==='behind') return ['#fb7185','#f472b6'];
  return ['#64748b','#475569'];
}
function arcColor(v) { return arcColors(v)[0]; }

function updateCacheStatus() {
  const age = getCacheAge();
  const el = document.getElementById('cache-status');
  if (!age) {
    el.innerHTML = '<span class="cache-dot fresh"></span> Live from Sheets';
  } else {
    const mins = Math.floor(age / 60000);
    const label = mins < 1 ? 'just now' : mins < 60 ? `${mins}m ago` : `${Math.floor(mins/60)}h ${mins%60}m ago`;
    const fresh = age < CACHE_TTL;
    el.innerHTML = `<span class="cache-dot ${fresh ? 'fresh' : 'stale'}"></span> ${fresh ? 'Cached' : 'Stale'} \u00b7 updated ${label}`;
  }
}

async function init(forceRefresh) {
  const dashRows = await fetchSheet('dashboard', forceRefresh);
  let hi = -1;
  for (let i = 0; i < dashRows.length; i++) if (dashRows[i].includes('Zone') && dashRows[i].includes('Goal')) { hi = i; break; }

  const goals = [];
  for (let i = hi+1; i < dashRows.length; i++) {
    const r = dashRows[i]; if (!r[1]) continue;
    const tgt = parseFloat(r[4]), pct = r[5] ? parseFloat(r[5])/100 : 0;
    const rawStatus = r[6], rawVerdict = r[11] || r[6];
    // Smarter verdict: "Close" if within 10pp of on-track
    let verdict = rawVerdict;
    if (!isNaN(tgt) && tgt > 0 && rawVerdict !== 'DONE' && rawVerdict !== 'Done' && rawStatus !== 'Not Started') {
      const gap = YR_PCT - pct; // positive = behind, negative = ahead
      if (pct >= YR_PCT) verdict = 'Ahead';
      else if (gap <= 0.10) verdict = 'Close';
      else verdict = 'Behind';
    }
    // Classify goal type for proper display
    const targetRaw = r[4];
    const goalLower = (r[2]||'').toLowerCase();
    const zoneLower = (r[1]||'').toLowerCase();
    let goalType = 'count'; // default: count up to N
    if (targetRaw === '—' || targetRaw === '-' || !targetRaw) goalType = 'open';
    else if (targetRaw.includes('%')) goalType = 'percent';
    else if (tgt === 1) goalType = 'binary';
    else if (tgt <= 0 || isNaN(tgt)) goalType = 'open';
    // One-offs and checklist-style goals: show as checklist, not pace
    if (zoneLower === 'one-offs' || goalLower.includes('first aid')) goalType = 'checklist';

    goals.push({ zone:r[1], goal:r[2], progress:parseFloat(r[3])||0, target:targetRaw, targetNum:tgt,
      pct, pctStr:r[5], status:rawStatus, dueDate:r[7], paceNeeded:r[8], currentRate:r[9], verdict, goalType });
  }

  const done = goals.filter(g => g.verdict==='DONE'||g.verdict==='Done').length;
  const ahead = goals.filter(g => g.verdict==='Ahead').length;
  const close = goals.filter(g => g.verdict==='Close').length;
  const behind = goals.filter(g => g.verdict==='Behind').length;
  const notStarted = goals.filter(g => g.status==='Not Started'||g.verdict==='-').length;
  const totalGoals = goals.length;

  updateCacheStatus();

  // Hero arcs
  document.getElementById('hero-arcs').innerHTML = `
    <div class="arc-container large">
      ${arcSVG(160, 12, YR_PCT, '#8b5cf6', '#38bdf8')}
      <div class="arc-center">
        <div class="arc-value" style="color:var(--accent-light)">${Math.round(YR_PCT*100)}%</div>
        <div class="arc-label">Year</div>
      </div>
      <div class="arc-sublabel">${DAYS_IN}d in &middot; ${DAYS_LEFT}d left</div>
    </div>

    <div class="hero-divider"></div>

    <div class="hero-mini-arcs">
      <div class="arc-container small">
        ${arcSVG(90, 7, (done+ahead)/totalGoals, '#34d399', '#22d3ee')}
        <div class="arc-center">
          <div class="arc-value" style="color:var(--emerald)">${done+ahead}</div>
        </div>
        <div class="arc-sublabel">On Track</div>
      </div>

      <div class="arc-container small">
        ${arcSVG(90, 7, close/totalGoals, '#fbbf24', '#fb923c')}
        <div class="arc-center">
          <div class="arc-value" style="color:var(--amber)">${close}</div>
        </div>
        <div class="arc-sublabel">Close</div>
      </div>

      <div class="arc-container small">
        ${arcSVG(90, 7, behind/totalGoals, '#fb7185', '#f472b6')}
        <div class="arc-center">
          <div class="arc-value" style="color:var(--rose)">${behind}</div>
        </div>
        <div class="arc-sublabel">Behind</div>
      </div>

      <div class="arc-container small">
        ${arcSVG(90, 7, notStarted/totalGoals, '#64748b', '#475569')}
        <div class="arc-center">
          <div class="arc-value" style="color:var(--text-muted)">${notStarted}</div>
        </div>
        <div class="arc-sublabel">Not Started</div>
      </div>
    </div>
  `;

  // Goal cards
  const grid = document.createElement('div');
  grid.className = 'goals-grid';

  for (const g of goals) {
    const cls = statusCls(g.verdict);
    const isCount = g.goalType === 'count';
    const pctVal = Math.min(g.pct, 1);
    const [c1, c2] = arcColors(g.verdict);
    const color = c1;

    let paceText = '', currentPaceText = '', fracText = '', arcPct = 0;

    if (isCount) {
      arcPct = pctVal;
      fracText = `${g.progress} / ${g.targetNum}`;
      if (g.progress < g.targetNum) {
        const rem = g.targetNum - g.progress;
        const npm = rem / (DAYS_LEFT / 30.4);
        paceText = `${npm.toFixed(1)}/mo needed`;
        if (g.progress > 0) currentPaceText = `${(g.progress / (DAYS_IN / 30.4)).toFixed(1)}/mo`;
      }
    } else if (g.goalType === 'percent') {
      arcPct = g.pctStr ? parseFloat(g.pctStr) / 100 : 0;
      fracText = g.pctStr || '0%';
    } else if (g.goalType === 'binary') {
      arcPct = g.progress >= 1 ? 1 : 0;
      fracText = g.progress >= 1 ? 'Done' : 'Not yet';
    } else if (g.goalType === 'checklist') {
      arcPct = g.targetNum > 0 ? g.progress / g.targetNum : 0;
      fracText = `${g.progress} / ${g.targetNum} done`;
    } else {
      // open-ended
      arcPct = 0;
      fracText = g.progress > 0 ? `${g.progress} logged` : '';
    }

    const card = document.createElement('div');
    card.className = `goal-card s-${cls}`;
    card.innerHTML = `
      <div class="card-arc">
        ${arcSVG(56, 5, arcPct, c1, c2)}
        <div class="arc-center"><div class="arc-value" style="color:${color}">${arcPct > 0 ? Math.round(arcPct*100)+'%' : '—'}</div></div>
      </div>
      <div class="card-body">
        <div class="card-top">
          <span class="card-zone">${g.zone}</span>
          <span class="badge ${cls}">${g.verdict==='-'?'Not Started':g.verdict}</span>
        </div>
        <div class="card-goal">${g.goal}</div>
        <div class="card-meta">
          ${fracText ? `<span>${fracText}</span>` : ''}
          ${currentPaceText ? `<span><strong>${currentPaceText}</strong> current</span>` : ''}
          ${paceText ? `<span>${paceText}</span>` : ''}
          <span>Due <strong>${g.dueDate}</strong></span>
        </div>
      </div>
    `;
    card.addEventListener('click', () => openDetail(g));
    grid.appendChild(card);
  }

  document.getElementById('goals-area').innerHTML = '';
  document.getElementById('goals-area').appendChild(grid);
  preloadSheets(forceRefresh);
}

const sheetCache = {};
async function preloadSheets(forceRefresh) {
  for (const k of Object.keys(SHEETS).filter(k=>k!=='dashboard')) fetchSheet(k, forceRefresh).then(d => sheetCache[k]=d);
}

function getSheetKey(zone) {
  const z = zone.toLowerCase();
  if (z==='parkrun') return 'parkrun';
  if (z==='fitness'||z==='sailing'||z==='strong') return 'fitness';
  if (z==='music') return 'music';
  if (z==='movies') return 'movies';
  if (z==='listening') return 'listening';
  if (z==='blood') return 'blood';
  if (z==='writing'||z==='poetry') return 'creative';
  if (z==='sleep'||z==='steps') return 'health';
  if (z==='volunteering') return 'volunteering';
  if (z==='one-offs'||z==='life admin') return 'lifeadmin';
  if (z==='getaways') return 'getaways';
  return null;
}

function findSection(rows, kw) {
  for (let i = 0; i < rows.length; i++) if (rows[i].join(' ').toLowerCase().includes(kw.toLowerCase())) return i;
  return -1;
}
function extractTable(rows, from) {
  let hi = -1;
  for (let i = from; i < rows.length; i++) if (rows[i].some(c=>c==='Done') && rows[i].filter(c=>c).length >= 3) { hi = i; break; }
  if (hi===-1) return {headers:[],entries:[]};
  const headers = rows[hi].filter((_,i)=>i>0);
  const entries = [];
  for (let i = hi+1; i < rows.length; i++) {
    const r = rows[i].slice(1);
    if (!r.some(c=>c)) break;
    if (r[0]==='TRUE'||r[0]==='FALSE'||r.some(c=>c&&c!=='FALSE')) entries.push(r);
  }
  return {headers,entries};
}

async function openDetail(goal) {
  const overlay = document.getElementById('detail-overlay');
  const content = document.getElementById('detail-content');
  const sk = getSheetKey(goal.zone);
  let rows = sheetCache[sk];
  if (!rows && sk) { rows = await fetchSheet(sk, false); sheetCache[sk] = rows; }

  const isCount = goal.goalType === 'count';
  const pctVal = Math.min(goal.pct, 1);
  const cls = statusCls(goal.verdict);
  const rem = isCount ? goal.targetNum - goal.progress : 0;
  const [dc1, dc2] = arcColors(goal.verdict);
  const color = dc1;
  const MO_IN = DAYS_IN / 30.4, MO_LEFT = DAYS_LEFT / 30.4;

  let pace = '';
  if (isCount && goal.progress < goal.targetNum) {
    const cpm = goal.progress / (MO_IN||1), npm = rem / MO_LEFT;
    if (goal.progress === 0) {
      pace = `You haven't started yet. To hit <strong>${goal.targetNum}</strong> by <strong>${goal.dueDate}</strong>, you need <strong>${npm.toFixed(1)} per month</strong>. That's ${Math.ceil(rem)} to go in ${MO_LEFT.toFixed(1)} months.`;
    } else if (cpm >= npm) {
      pace = `You're doing <strong>${cpm.toFixed(1)}/month</strong> and only need <strong>${npm.toFixed(1)}/month</strong>. At this pace you'll finish with <strong>${Math.round((rem/cpm)*30.4)} days</strong> to spare.`;
    } else {
      pace = `You're averaging <strong>${cpm.toFixed(1)}/month</strong> but need <strong>${npm.toFixed(1)}/month</strong>. Pick up by <strong>${(npm-cpm).toFixed(1)} more per month</strong> to get there.`;
    }
  } else if (isCount && goal.progress >= goal.targetNum) {
    pace = `Target reached! <strong>${goal.progress} / ${goal.targetNum}</strong> complete.`;
  } else if (goal.goalType === 'binary') {
    pace = goal.progress >= 1 ? 'Done!' : `One-time goal. Due <strong>${goal.dueDate}</strong>.`;
  } else if (goal.goalType === 'percent') {
    pace = `This is a daily habit \u2014 track it in the spreadsheet and your percentage will update here.`;
  } else if (goal.goalType === 'checklist') {
    pace = goal.progress > 0 ? `<strong>${goal.progress} / ${goal.targetNum}</strong> items ticked off. Keep chipping away!` : 'Checklist goal \u2014 tick items off in the spreadsheet as you complete them.';
  } else if (goal.goalType === 'open') {
    pace = goal.progress > 0 ? `You've logged <strong>${goal.progress}</strong> so far. Keep going!` : 'Open-ended goal \u2014 start logging in the spreadsheet.';
  }

  let stats = '', detailArcPct = 0;
  if (isCount) {
    detailArcPct = pctVal;
    const clr = cls==='behind'?'rose':(cls==='ahead'||cls==='done')?'emerald':'amber';
    stats = `<div class="detail-stats">
      <div class="d-stat"><div class="val sky">${goal.progress}</div><div class="lbl">Done</div></div>
      <div class="d-stat"><div class="val">${rem}</div><div class="lbl">Remaining</div></div>
      <div class="d-stat"><div class="val ${clr}">${Math.round(pctVal*100)}%</div><div class="lbl">Complete</div></div>
      <div class="d-stat"><div class="val">${Math.round(YR_PCT*100)}%</div><div class="lbl">Year</div></div>
      ${goal.progress>0?`<div class="d-stat"><div class="val">${(goal.progress/MO_IN).toFixed(1)}</div><div class="lbl">Per Month</div></div>`:''}
      ${rem>0?`<div class="d-stat"><div class="val amber">${(rem/MO_LEFT).toFixed(1)}</div><div class="lbl">Need/Mo</div></div>`:''}
    </div>`;
  } else if (goal.goalType === 'percent') {
    const pctProgress = goal.pctStr ? parseFloat(goal.pctStr) : 0;
    detailArcPct = pctProgress / 100;
    stats = `<div class="detail-stats">
      <div class="d-stat"><div class="val sky">${goal.pctStr || '0%'}</div><div class="lbl">Current</div></div>
      <div class="d-stat"><div class="val">${goal.target}</div><div class="lbl">Target</div></div>
      <div class="d-stat"><div class="val">${Math.round(YR_PCT*100)}%</div><div class="lbl">Year</div></div>
    </div>`;
  } else if (goal.goalType === 'checklist') {
    detailArcPct = goal.targetNum > 0 ? goal.progress / goal.targetNum : 0;
    stats = `<div class="detail-stats">
      <div class="d-stat"><div class="val sky">${goal.progress}</div><div class="lbl">Done</div></div>
      <div class="d-stat"><div class="val">${goal.targetNum - goal.progress}</div><div class="lbl">Remaining</div></div>
      <div class="d-stat"><div class="val">${Math.round(detailArcPct*100)}%</div><div class="lbl">Complete</div></div>
    </div>`;
  } else if (goal.goalType === 'binary') {
    detailArcPct = goal.progress >= 1 ? 1 : 0;
    stats = `<div class="detail-stats">
      <div class="d-stat"><div class="val ${goal.progress >= 1 ? 'emerald' : 'rose'}">${goal.progress >= 1 ? 'Done' : 'Not Yet'}</div><div class="lbl">Status</div></div>
      <div class="d-stat"><div class="val">${Math.round(YR_PCT*100)}%</div><div class="lbl">Year</div></div>
    </div>`;
  }

  let progHtml = '';
  if (isCount) {
    const yearMarker = Math.round(YR_PCT*100);
    progHtml = `<div class="detail-progress">
      <div class="labels"><strong>${goal.progress} / ${goal.targetNum}</strong><span>${Math.round(pctVal*100)}% complete</span></div>
      <div class="progress-rail">
        <div class="progress-fill" style="width:${pctVal*100}%;background:linear-gradient(90deg,${dc1},${dc2})"></div>
        <div class="marker" style="left:${yearMarker}%" title="Year progress: ${yearMarker}%"></div>
      </div>
    </div>`;
  }

  // Table from sheet
  let tableHtml = '';
  if (rows) {
    const terms = { parkrun: goal.goal.includes('volunteer')?'VOLUNTEER':'PARKRUN TRACKER',
      fitness: goal.zone.toLowerCase()==='sailing'?'SAILING':goal.zone.toLowerCase()==='strong'?'STRENGTH':goal.goal.includes('trail')?'TRAIL':goal.goal.includes('Tai')?'TAI CHI':'CITY TO BAY',
      music: goal.goal.includes('artist')?'NEW ARTISTS':'NEW ALBUMS',
      creative: goal.goal.includes('poetry')?'POETRY':'WRITING' };
    let from = 0;
    if (terms[sk]) { const idx = findSection(rows, terms[sk]); if (idx>=0) from = idx; }
    const {headers, entries} = extractTable(rows, from);
    if (entries.length && entries.some(e=>e.some((c,i)=>i>0&&c&&c!=='FALSE'))) {
      tableHtml = '<table class="detail-table"><thead><tr>';
      for (const h of headers) if (h) tableHtml += `<th>${h}</th>`;
      tableHtml += '</tr></thead><tbody>';
      for (const e of entries) {
        const d = e[0]==='TRUE';
        tableHtml += `<tr class="${d?'done-row':''}">`;
        for (let i=0;i<headers.length;i++) { if (!headers[i]) continue;
          tableHtml += i===0 ? `<td>${d?'<span class="check">\u2713</span>':'<span class="uncheck">\u25CB</span>'}</td>` : `<td>${e[i]||''}</td>`; }
        tableHtml += '</tr>';
      }
      tableHtml += '</tbody></table>';
    }
  }

  content.innerHTML = `
    <div class="detail-hero">
      <div class="card-arc">${arcSVG(80, 7, detailArcPct, dc1, dc2)}<div class="arc-center" style="top:8px"><div class="arc-value" style="color:${color};font-size:1.3rem">${detailArcPct>0?Math.round(detailArcPct*100)+'%':'—'}</div></div></div>
      <div class="detail-hero-info"><h2>${goal.goal}</h2><p>${goal.zone} \u00b7 Due ${goal.dueDate}</p></div>
    </div>
    ${stats}${progHtml}${pace?`<div class="pace-insight">${pace}</div>`:''}${tableHtml}`;
  overlay.classList.add('open');
}

document.getElementById('detail-close').addEventListener('click', () => document.getElementById('detail-overlay').classList.remove('open'));
document.getElementById('detail-overlay').addEventListener('click', e => { if (e.target===e.currentTarget) e.currentTarget.classList.remove('open'); });
document.addEventListener('keydown', e => { if (e.key==='Escape') document.getElementById('detail-overlay').classList.remove('open'); });

document.getElementById('refresh-btn').addEventListener('click', async () => {
  const btn = document.getElementById('refresh-btn');
  btn.classList.add('spinning');
  btn.disabled = true;
  clearAllCache();
  // Clear detail sheet cache too
  Object.keys(sheetCache).forEach(k => delete sheetCache[k]);
  await init(true);
  btn.classList.remove('spinning');
  btn.disabled = false;
});

init(false);
</script>
</body>
</html>
